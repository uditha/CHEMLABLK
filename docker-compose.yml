services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chemlab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chemlab_user
      POSTGRES_PASSWORD: chemlab_pass
      POSTGRES_DB: chemlab_lk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemlab_user -d chemlab_lk"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Prisma migrate + seed ───────────────────────────────────────────────────
  migrate:
    build:
      context: .
      target: builder
    container_name: chemlab_migrate
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx prisma db seed || true"
    environment:
      DATABASE_URL: postgresql://chemlab_user:chemlab_pass@postgres:5432/chemlab_lk?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Next.js app ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: runner
    container_name: chemlab_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://chemlab_user:chemlab_pass@postgres:5432/chemlab_lk?schema=public
      NEXTAUTH_SECRET: chemlab-dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: ChemLab LK
      NEXT_PUBLIC_APP_VERSION: 1.0.0
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
